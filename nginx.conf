events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Max upload size for message attachments
    client_max_body_size 100M;

    # Docker's internal DNS resolver, used to resolve upstreams at runtime
    resolver 127.0.0.11 ipv6=off valid=30s;

    server {
        listen 80;
        server_name showcase.local localhost;

        # API gateway (NestJS) — docker-compose service name: gateway
        location /api {
            set $gateway_upstream gateway:3005;
            proxy_pass http://$gateway_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
