services:
  # Message broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: showcase-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - showcase-network

  # Primary database (PostgreSQL)
  postgres:
    image: postgres:15
    container_name: showcase-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-showcase_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin} -d ${DB_NAME:-showcase_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - showcase-network

  # Database admin UI (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: showcase-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - showcase-network

  # API gateway (NestJS)
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: showcase-gateway
    ports:
      - "3005:3005"
    env_file:
      - .env
    environment:
      # Polling is required for file watching on Windows volume mounts;
      # without an interval, Nest's watch mode crashes.
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    volumes:
      - .:/usr/src/app             # mount the whole project into the container
      - /usr/src/app/node_modules  # prevent host volume from hiding container deps
    command: npm run start:dev     # run NestJS in watch mode
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - showcase-network

  # Messaging microservice
  messaging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: showcase-messaging
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - showcase-network
    command: npm run start:dev:messaging

  # Reverse proxy (Nginx)
  nginx:
    image: nginx:latest
    container_name: showcase-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_started
    networks:
      - showcase-network

networks:
  showcase-network:
    driver: bridge
