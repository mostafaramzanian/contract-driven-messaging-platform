# Host port mappings here (5432, 5672, 15672, 3005, 3006) are intentionally
# the SAME as docker-compose.yml (dev stack).  This test stack and the dev
# stack cannot both run simultaneously on the same machine.  Stop the dev
# stack (`docker-compose down`) before running `npm run test:integration`.
#
# EVOLUTION STAGE changes:
#  - messaging service now exposes port 3006 (HEALTH_PORT) for the internal
#    HTTP server that serves /internal/health/ready and /internal/health/live.
#  - gateway receives MESSAGING_HEALTH_URL pointing at the internal host
#    address so the gateway /health/ready probe can reach the messaging health.
#  - health.integration-spec.ts uses MESSAGING_HEALTH_URL = 127.0.0.1:3006.
services:
  postgres:
    image: postgres:15
    container_name: showcase-test-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-test_password}
      POSTGRES_DB: ${DB_NAME:-showcase_test_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin} -d ${DB_NAME:-showcase_test_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - showcase-test-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: showcase-test-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - showcase-test-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: showcase-test-migrate
    env_file:
      - .env.test
    environment:
      DB_HOST: postgres
    command: ["npm", "run", "migration:run:all"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - showcase-test-network

  messaging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: showcase-test-messaging
    env_file:
      - .env.test
    environment:
      DB_HOST: postgres
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      # Internal HTTP server port for health probes
      HEALTH_PORT: "3006"
      SERVICE_NAME: messaging
      # No OTel Collector in the test stack — disable the SDK so spans/metrics
      # exporters don't retry against an unreachable OTLP endpoint and slow
      # down or flake the integration suite. /metrics (prom-client) still
      # works fine with OTEL_SDK_DISABLED=true.
      OTEL_SDK_DISABLED: "true"
    ports:
      # Expose the internal health HTTP server to the host for probe assertions
      - "3006:3006"
    command: ["node", "dist/apps/messaging/main"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # The test runner waits for this before starting the gateway
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/internal/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - showcase-test-network

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: showcase-test-gateway
    env_file:
      - .env.test
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 3005
      SERVICE_NAME: gateway
      # URL the gateway /health/ready probe uses to check the messaging service.
      # Inside the Docker network the messaging service is reachable by its
      # service name 'messaging' on the HEALTH_PORT.
      MESSAGING_HEALTH_URL: http://messaging:3006/internal/health/ready
      OTEL_SDK_DISABLED: "true"
      # Fast outbox knobs for integration tests — same rationale as the
      # messaging service's OUTBOX_* knobs below.
      GATEWAY_OUTBOX_POLL_INTERVAL_MS: "2000"
      GATEWAY_OUTBOX_LOCK_TTL_MS: "5000"
      GATEWAY_OUTBOX_REAPER_INTERVAL_MS: "5000"
    ports:
      - "3005:3005"
    command: ["node", "dist/apps/gateway/main"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      messaging:
        condition: service_healthy
    networks:
      - showcase-test-network

networks:
  showcase-test-network:
    driver: bridge
